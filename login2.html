<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Pages - Login | ITYUKTA 2K26</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@300;400;700;900&family=Fira+Code:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-bg: #0a0a0f;
            --secondary-bg: #1a1a2e;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --neon-blue: #00d4ff;
            --neon-purple: #8b5cf6;
            --neon-pink: #f472b6;
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --error-color: #ff0040;
            --success-color: #00ff00;
            --gradient-primary: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
            --gradient-secondary: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
        }

        body {
            font-family: 'Orbitron', monospace;
            background: var(--primary-bg);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Animated Background */
        .animated-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        /* Matrix Rain Canvas */
        #matrix-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.2;
            z-index: -1;
        }

        .bg-gradient {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, rgba(139, 92, 246, 0.1) 0%, transparent 70%);
            animation: gradientShift 8s ease-in-out infinite;
        }

        @keyframes gradientShift {

            0%,
            100% {
                background: radial-gradient(ellipse at center, rgba(139, 92, 246, 0.1) 0%, transparent 70%);
            }

            50% {
                background: radial-gradient(ellipse at center, rgba(0, 212, 255, 0.1) 0%, transparent 70%);
            }
        }

        .bg-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(0, 212, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% {
                transform: translate(0, 0);
            }

            100% {
                transform: translate(50px, 50px);
            }
        }

        /* Floating Particles */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--neon-blue);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--neon-blue);
            animation: particleFloat 15s linear infinite;
        }

        .particle:nth-child(1) {
            left: 10%;
            animation-delay: 0s;
            animation-duration: 12s;
        }

        .particle:nth-child(2) {
            left: 20%;
            animation-delay: 2s;
            animation-duration: 18s;
            background: var(--neon-purple);
            box-shadow: 0 0 10px var(--neon-purple);
        }

        .particle:nth-child(3) {
            left: 30%;
            animation-delay: 4s;
            animation-duration: 14s;
        }

        .particle:nth-child(4) {
            left: 40%;
            animation-delay: 6s;
            animation-duration: 16s;
            background: var(--neon-pink);
            box-shadow: 0 0 10px var(--neon-pink);
        }

        .particle:nth-child(5) {
            left: 60%;
            animation-delay: 8s;
            animation-duration: 20s;
        }

        .particle:nth-child(6) {
            left: 70%;
            animation-delay: 10s;
            animation-duration: 13s;
            background: var(--neon-purple);
            box-shadow: 0 0 10px var(--neon-purple);
        }

        .particle:nth-child(7) {
            left: 80%;
            animation-delay: 12s;
            animation-duration: 17s;
        }

        .particle:nth-child(8) {
            left: 90%;
            animation-delay: 14s;
            animation-duration: 19s;
            background: var(--neon-pink);
            box-shadow: 0 0 10px var(--neon-pink);
        }

        @keyframes particleFloat {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        /* Login Container */
        .login-container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 2px solid var(--glass-border);
            border-radius: 20px;
            padding: 50px 40px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow:
                0 25px 50px rgba(0, 212, 255, 0.1),
                0 0 100px rgba(139, 92, 246, 0.1);
            animation: loginFadeIn 1.5s ease-out;
        }

        @keyframes loginFadeIn {
            0% {
                opacity: 0;
                transform: translateY(50px) scale(0.9);
            }

            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--gradient-primary);
            animation: borderGlow 3s ease-in-out infinite;
        }

        @keyframes borderGlow {

            0%,
            100% {
                opacity: 0.5;
                box-shadow: 0 0 20px var(--neon-blue);
            }

            50% {
                opacity: 1;
                box-shadow: 0 0 40px var(--neon-blue);
            }
        }

        .login-container::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: var(--gradient-primary);
            border-radius: 22px;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .login-container:hover::after {
            opacity: 0.1;
        }

        /* Enhanced Glitch Animation for SHADOW PAGES */
        .main-title {
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 900;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            margin-top: 20px;
            position: relative;
            animation: intenseGlitch 3s infinite;
        }

        @keyframes intenseGlitch {

            0%,
            90%,
            100% {
                transform: translate(0);
                filter: hue-rotate(0deg);
            }

            1% {
                transform: translate(-3px, -3px);
                filter: hue-rotate(90deg);
            }

            2% {
                transform: translate(3px, 3px);
                filter: hue-rotate(180deg);
            }

            3% {
                transform: translate(-3px, 3px);
                filter: hue-rotate(270deg);
            }

            4% {
                transform: translate(3px, -3px);
                filter: hue-rotate(360deg);
            }

            5% {
                transform: translate(0);
                filter: hue-rotate(0deg);
            }

            10% {
                transform: translate(-2px, 2px);
                filter: hue-rotate(45deg);
            }

            15% {
                transform: translate(2px, -2px);
                filter: hue-rotate(135deg);
            }

            20% {
                transform: translate(0);
                filter: hue-rotate(0deg);
            }
        }

        .main-title::before,
        .main-title::after {
            content: 'SHADOW PAGES';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .main-title::before {
            background: var(--error-color);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glitchLayer1 0.2s infinite;
        }

        .main-title::after {
            background: var(--neon-blue);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glitchLayer2 0.3s infinite;
            z-index: -2;
        }

        @keyframes glitchLayer1 {

            0%,
            100% {
                transform: translate(0);
            }

            10% {
                transform: translate(-2px, 2px);
            }

            20% {
                transform: translate(-2px, -2px);
            }

            30% {
                transform: translate(2px, 2px);
            }

            40% {
                transform: translate(2px, -2px);
            }

            50% {
                transform: translate(-2px, 2px);
            }

            60% {
                transform: translate(2px, 2px);
            }

            70% {
                transform: translate(-2px, -2px);
            }

            80% {
                transform: translate(2px, -2px);
            }

            90% {
                transform: translate(-2px, 2px);
            }
        }

        @keyframes glitchLayer2 {

            0%,
            100% {
                transform: translate(0);
            }

            15% {
                transform: translate(3px, -3px);
            }

            25% {
                transform: translate(3px, 3px);
            }

            35% {
                transform: translate(-3px, -3px);
            }

            45% {
                transform: translate(-3px, 3px);
            }

            55% {
                transform: translate(3px, -3px);
            }

            65% {
                transform: translate(-3px, 3px);
            }

            75% {
                transform: translate(3px, 3px);
            }

            85% {
                transform: translate(-3px, -3px);
            }

            95% {
                transform: translate(3px, -3px);
            }
        }

        /* Typing Effect for Unauthorized Access Restricted */
        .access-restricted {
            font-size: 1rem;
            color: var(--error-color);
            font-family: 'Fira Code', monospace;
            margin-bottom: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            animation: fadeInTyping 1s ease-out 2s both;
        }

        @keyframes fadeInTyping {
            0% {
                opacity: 0;
            }

            100% {
                opacity: 1;
            }
        }

        .typing-cursor {
            color: var(--error-color);
            animation: blink 1s infinite;
            margin-left: 2px;
        }

        @keyframes blink {

            0%,
            50% {
                opacity: 1;
            }

            51%,
            100% {
                opacity: 0;
            }
        }

        .sub-title {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 20px;
            font-weight: 400;
            letter-spacing: 2px;
            animation: subtitleFade 2s ease-out 0.5s both;
        }

        @keyframes subtitleFade {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Form Styles */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 25px;
            animation: formSlideUp 2s ease-out 1s both;
        }

        @keyframes formSlideUp {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .input-field {
            width: 100%;
            padding: 18px 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: 'Fira Code', monospace;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
            margin-top: 15px;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--neon-blue);
            background: rgba(0, 212, 255, 0.08);
            box-shadow:
                0 0 20px rgba(0, 212, 255, 0.3),
                inset 0 0 20px rgba(0, 212, 255, 0.1),
                inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .input-field::placeholder {
            color: var(--text-muted);
            font-family: 'Orbitron', monospace;
            opacity: 0.8;
        }

        .input-field:hover {
            border-color: rgba(0, 212, 255, 0.5);
            background: rgba(255, 255, 255, 0.1);
        }

        .input-label {
            position: absolute;
            top: 0;
            left: 15px;
            background: var(--primary-bg);
            padding: 0 10px;
            font-size: 0.9rem;
            color: var(--neon-blue);
            font-weight: 500;
            letter-spacing: 1px;
            z-index: 10;
        }

        /* Checkbox Styles */
        .checkbox-field {
            width: 20px !important;
            height: 20px !important;
            padding: 0 !important;
            margin: 15px 0 0 20px !important;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid var(--glass-border);
            border-radius: 4px;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
        }

        .checkbox-field:checked {
            background: var(--neon-blue);
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.5);
        }

        .checkbox-field:checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--primary-bg);
            font-size: 14px;
            font-weight: bold;
        }

        .checkbox-field:hover {
            border-color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        .checkbox-text {
            color: var(--text-muted);
            font-family: 'Orbitron', monospace;
            font-size: 0.9rem;
            margin-left: 10px;
            opacity: 0.8;
        }

        /* Checkbox Group Styles */
        .checkbox-group {
            margin: 15px 0;
            text-align: left;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            cursor: pointer;
            padding: 10px 0;
            transition: all 0.3s ease;
        }

        .checkbox-container:hover {
            transform: translateX(5px);
        }

        .checkmark {
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid var(--glass-border);
            border-radius: 4px;
            margin-right: 12px;
            position: relative;
            transition: all 0.3s ease;
        }

        .checkbox-container input[type="checkbox"] {
            display: none;
        }

        .checkbox-container input[type="checkbox"]:checked+.checkmark {
            background: var(--neon-blue);
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.5);
        }

        .checkbox-container input[type="checkbox"]:checked+.checkmark::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--primary-bg);
            font-size: 14px;
            font-weight: bold;
        }

        .checkbox-container:hover .checkmark {
            border-color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        /* Enhanced Login Button */
        .login-button {
            padding: 18px 30px;
            background: var(--glass-bg);
            border: 2px solid var(--neon-blue);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'Orbitron', monospace;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .login-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .login-button:hover::before {
            left: 100%;
        }

        .login-button:hover {
            border-color: var(--neon-purple);
            box-shadow:
                0 0 30px rgba(0, 212, 255, 0.5),
                0 0 60px rgba(139, 92, 246, 0.3);
            transform: translateY(-2px);
            background: rgba(0, 212, 255, 0.1);
        }

        .login-button:active {
            transform: translateY(0);
            box-shadow:
                0 0 20px rgba(0, 212, 255, 0.3),
                0 0 40px rgba(139, 92, 246, 0.2);
        }

        .login-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Loading Animation */
        .loading {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid var(--glass-border);
            border-top: 2px solid var(--neon-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Enhanced Shake Animation */
        .shake-container {
            animation: violentShake 0.8s ease-in-out;
        }

        @keyframes violentShake {

            0%,
            100% {
                transform: translateX(0) translateY(0);
            }

            10% {
                transform: translateX(-10px) translateY(-5px);
            }

            20% {
                transform: translateX(10px) translateY(5px);
            }

            30% {
                transform: translateX(-8px) translateY(-3px);
            }

            40% {
                transform: translateX(8px) translateY(3px);
            }

            50% {
                transform: translateX(-6px) translateY(-2px);
            }

            60% {
                transform: translateX(6px) translateY(2px);
            }

            70% {
                transform: translateX(-4px) translateY(-1px);
            }

            80% {
                transform: translateX(4px) translateY(1px);
            }

            90% {
                transform: translateX(-2px) translateY(0px);
            }
        }

        /* Error Message */
        .error-message {
            background: rgba(255, 0, 64, 0.1);
            border: 1px solid var(--error-color);
            border-radius: 8px;
            padding: 15px;
            color: var(--error-color);
            font-size: 0.9rem;
            font-family: 'Fira Code', monospace;
            margin-top: 20px;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            display: none;
        }

        .error-message.show {
            display: block;
            opacity: 1;
            transform: translateY(0);
            animation: errorPulse 0.5s ease-in-out;
        }

        @keyframes errorPulse {

            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 0 0 rgba(255, 0, 64, 0.5);
            }

            50% {
                transform: scale(1.02);
                box-shadow: 0 0 20px rgba(255, 0, 64, 0.5);
            }
        }

        /* Success Message */
        .success-message {
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid var(--success-color);
            border-radius: 8px;
            padding: 15px;
            color: var(--success-color);
            font-size: 0.9rem;
            font-family: 'Fira Code', monospace;
            margin-top: 20px;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            display: none;
        }

        .success-message.show {
            display: block;
            opacity: 1;
            transform: translateY(0);
            animation: successGlow 0.5s ease-in-out;
        }

        @keyframes successGlow {

            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 0 0 rgba(0, 255, 0, 0.5);
            }

            50% {
                transform: scale(1.02);
                box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
            }
        }

        /* Transition Overlay */
        .transition-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary-bg), var(--secondary-bg));
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s ease;
        }

        .transition-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .transition-content {
            text-align: center;
        }

        .transition-logo {
            font-family: 'Orbitron', monospace;
            font-size: 3rem;
            font-weight: 900;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 30px;
            animation: intenseGlitch 1s infinite;
        }

        .transition-loader {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(0, 212, 255, 0.3);
            border-top: 3px solid var(--neon-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .login-container {
                padding: 40px 30px;
                margin: 20px;
            }

            .main-title {
                font-size: 2.5rem;
            }

            .sub-title {
                font-size: 1rem;
                margin-bottom: 15px;
            }

            .access-restricted {
                font-size: 0.9rem;
                margin-bottom: 15px;
            }

            .input-field {
                padding: 15px 18px;
                font-size: 0.9rem;
            }

            .login-button {
                padding: 15px 25px;
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }

            .main-title {
                font-size: 2rem;
            }

            .sub-title {
                font-size: 0.9rem;
                letter-spacing: 1px;
            }

            .login-form {
                gap: 20px;
            }
        }

        /* Additional Glow Effects */
        .glow-effect {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.1) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            border-radius: 50%;
            animation: glowPulse 4s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes glowPulse {

            0%,
            100% {
                opacity: 0.3;
                transform: translate(-50%, -50%) scale(1);
            }

            50% {
                opacity: 0.6;

            // Enhanced Sound effects using Web Audio API
            playSound(frequency, duration, type = 'sine', volume = 0.1) {
                if (!window.AudioContext && !window.webkitAudioContext) return;

                try {
                    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const oscillator = audioContext.createOscillator();
                    const gainNode = audioContext.createGain();

                    oscillator.connect(gainNode);
                    gainNode.connect(audioContext.destination);

                    oscillator.frequency.value = frequency;
                    oscillator.type = type;

                    gainNode.gain.setValueAtTime(volume, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);

                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + duration);
                } catch (error) {
                    // Silently fail if audio context is not available
                }
            }

        // Particle animation enhancement
        class ParticleEnhancement {
            constructor() {
                this.particles = document.querySelectorAll('.particle');
                this.init();
            }

            init() {
                // Add mouse interaction
                document.addEventListener('mousemove', (e) => {
                    this.particles.forEach((particle, index) => {
                        const rect = particle.getBoundingClientRect();
                        const particleX = rect.left + rect.width / 2;
                        const particleY = rect.top + rect.height / 2;

                        const distance = Math.sqrt(
                            Math.pow(e.clientX - particleX, 2) +
                            Math.pow(e.clientY - particleY, 2)
                        );

                        if (distance < 100) {
                            const force = (100 - distance) / 100;
                            const angle = Math.atan2(particleY - e.clientY, particleX - e.clientX);
                            const moveX = Math.cos(angle) * force * 20;
                            const moveY = Math.sin(angle) * force * 20;

                            particle.style.transform = `translate(${moveX}px, ${moveY}px)`;
                            particle.style.transition = 'transform 0.3s ease-out';
                        } else {
                            particle.style.transform = '';
                        }
                    });
                });
            }
        }
